- Productivity:
    - Paperless-ngx:
        icon: paperless-ngx.png
        href: https://paperless.mauricioantolin.com
        description: DMS / OCR — drop PDFs en \\home-server\paperless-consume
        widget:
          type: paperlessngx
          url: http://127.0.0.1:8000
          key: "{{HOMEPAGE_VAR_PAPERLESS_TOKEN}}"
    - Radicale:
        icon: radicale.png
        href: https://cal.mauricioantolin.com
        description: CalDAV / CardDAV — auth htpasswd (sin SSO)

- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: https://home-server.tailee5654.ts.net:8196/
        description: Streaming media — SSO via plugin
        widget:
          type: jellyfin
          url: http://127.0.0.1:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableNowPlaying: true
          enableUser: false
          enableBlocks: true
