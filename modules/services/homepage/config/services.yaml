- Auth:
    - Keycloak:
        icon: keycloak.png
        href: https://auth.mauricioantolin.com/admin/master/console/
        description: Realm homelab — admin SSO (KC 26)
    - Vaultwarden:
        icon: bitwarden.png
        href: https://vault.mauricioantolin.com
